<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" title="Cambiar a modo claro">
        <input type="checkbox" id="theme-toggle-input" />
        <span class="theme-toggle-slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section leaderboard">
          <span class="label">RECORDS</span>
          <ol class="leaderboard-list" id="leaderboard-list"></ol>
          <div class="leaderboard-stats">
            <div class="leaderboard-stat">
              <span class="label">MEJOR COMBO</span>
              <span class="value small" id="best-combo">0</span>
            </div>
            <div class="leaderboard-stat">
              <span class="label">MÁS LÍNEAS</span>
              <span class="value small" id="max-lines">0</span>
            </div>
          </div>
          <button id="reset-leaderboard-btn" class="reset-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="new-record-note" class="new-record-note hidden"></p>
        <input type="text" id="name-input" class="name-input" maxlength="12" placeholder="Tu nombre" />
        <button id="save-score-btn">Guardar</button>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
