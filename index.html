<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <div class="board-column">
        <h1 class="game-title">TETRIS</h1>
        <canvas id="board" width="450" height="900"></canvas>
      </div>

      <aside class="panel">
        <div class="panel-top">
          <label class="theme-toggle" title="Cambiar a modo claro">
            <input type="checkbox" id="theme-toggle-input" />
            <span class="theme-toggle-slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section leaderboard">
          <div class="leaderboard-header">
            <span class="label">RECORDS</span>
            <select id="skin-select" class="skin-select" title="Cambiar skin">
              <option value="retro">Retro</option>
              <option value="neon">Neon</option>
              <option value="pastel">Pastel</option>
              <option value="pixel">Pixel art</option>
            </select>
          </div>
          <ol class="leaderboard-list" id="leaderboard-list"></ol>
          <div class="leaderboard-stats">
            <div class="leaderboard-stat">
              <span class="label">MEJOR COMBO</span>
              <span class="value small" id="best-combo">0</span>
            </div>
            <div class="leaderboard-stat">
              <span class="label">MÁS LÍNEAS</span>
              <span class="value small" id="max-lines">0</span>
            </div>
          </div>
          <button id="reset-leaderboard-btn" class="reset-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="new-record-note" class="new-record-note hidden"></p>
        <input type="text" id="name-input" class="name-input" maxlength="12" placeholder="Tu nombre" />
        <button id="save-score-btn">Guardar</button>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="pause-title">PAUSA</p>
        <div class="pause-buttons">
          <button id="resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
          <button id="controls-btn">Ver controles</button>
        </div>
        <ul id="pause-controls-list" class="pause-controls hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> pausa</li>
        </ul>
        <div class="pause-level-select">
          <label for="start-level-select">Nivel inicial</label>
          <select id="start-level-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
